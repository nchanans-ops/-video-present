<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video · iPhone</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f0f6ff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  font-family: 'DM Sans', sans-serif;
}
.shell {
  background: #dce8f5;
  border-radius: 52px;
  border: 8px solid #b5cfe8;
  outline: 1.5px solid #a0c0e0;
  padding: 12px 8px;
  position: relative;
  width: 320px;
}
.btn-l1 { position:absolute;left:-13px;top:84px;width:5px;height:26px;background:#b5cfe8;border-radius:3px 0 0 3px; }
.btn-l2 { position:absolute;left:-13px;top:120px;width:5px;height:40px;background:#b5cfe8;border-radius:3px 0 0 3px; }
.btn-l3 { position:absolute;left:-13px;top:170px;width:5px;height:40px;background:#b5cfe8;border-radius:3px 0 0 3px; }
.btn-r  { position:absolute;right:-13px;top:132px;width:5px;height:60px;background:#b5cfe8;border-radius:0 3px 3px 0; }
.screen {
  background: #000;
  border-radius: 40px;
  overflow: hidden;
  height: 620px;
  position: relative;
}
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.tap-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.45);
  cursor: pointer;
  z-index: 5;
  border-radius: 40px;
}
.tap-btn {
  width: 70px; height: 70px;
  border-radius: 50%;
  background: #378add;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 12px rgba(55,138,221,0.2);
}
.tap-btn svg { width: 28px; height: 28px; fill: #fff; margin-left: 4px; }
</style>
</head>
<body>
<div class="shell">
  <div class="btn-l1"></div>
  <div class="btn-l2"></div>
  <div class="btn-l3"></div>
  <div class="btn-r"></div>
  <div class="screen">
    <video id="v" loop playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>
    <div class="tap-overlay" id="overlay" onclick="startVideo()">
      <div class="tap-btn">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
    </div>
  </div>
</div>

<script>
function startVideo() {
  const v = document.getElementById('v');
  const overlay = document.getElementById('overlay');
  v.muted = false;
  v.play();
  overlay.style.display = 'none';
}
</script>
</body>
</html>
